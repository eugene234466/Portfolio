<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
        <title>{% block title %}Eugene Yarney Portfolio{% endblock %}</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="{{url_for('static', filename='css/style.css')}}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    </head>
    <body>
        <nav class="navbar-main">
            <div class="inner">
                <a href="{{url_for('index')}}" class="logo">
                    <img src="{{url_for('static', filename='images/logo.png')}}" alt="logo">
                    <span class="name">Eugene Yarney</span>
                </a>
                <ul class="nav-links">
                    <li class="nav-link"><a href="{{url_for('index') }}">Home</a></li>
                    <li class="nav-link"><a href="{{url_for('projects')}}">Projects</a></li>
                    <li class="nav-link"><a href="{{url_for('contact')}}">Contact</a></li>
                    <li class="nav-link"><a href="{{url_for('blog')}}">Blog</a></li>
                    <li class="nav-link"><a href="{{url_for('skills')}}">Skills</a></li>
                    <li class="nav-link"><a href="{{url_for('resume')}}">Resume</a></li>
                </ul>
            </div>
        </nav>
        {% block content %} {% endblock %}
        <footer class="footer">
            <div class="inner">
                <p>&copy; 2026 Eugene Yarney</p>
                <ul class="social-links">
                    <li><a href="https://wa.me/+233506798129" target="_blank">
                            <img src="{{url_for('static', filename='images/whatsapp.png')}}" alt="whatsapp">
                        </a>
                    </li>
                    <li><a href="https://github.com/eugene234466" target="_blank">
                            <img src="{{url_for('static', filename='images/github.png')}}" alt="github">
                        </a>
                    </li>
                    <li><a href="https://linkedin.com/in/eugene-yarney" target="_blank">
                            <img src="{{url_for('static', filename='images/linkedin.png')}}" alt="linkedin">
                        </a>
                    </li>
                    <li><a href="mailto:eugeneyarney23@gmail.com" target="_blank">
                            <img src="{{url_for('static', filename='images/email.png')}}" alt="gmail">
                        </a>
                    </li>
                </ul>
            </div>
        </footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="{{url_for('static', filename='js/main.js')}}"></script>
    </body>
</html>
